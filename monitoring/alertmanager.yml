route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical-alerts'
      repeat_interval: 1h
    - match:
        compliance: bot-eod
      receiver: 'regulatory-alerts'

receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://localhost:5001/alerts'   # Replace with Slack webhook in production

  - name: 'critical-alerts'
    webhook_configs:
      - url: 'http://localhost:5001/critical'   # Replace with PagerDuty in production

  - name: 'regulatory-alerts'
    webhook_configs:
      - url: 'http://localhost:5001/regulatory'   # Replace with compliance team channel
