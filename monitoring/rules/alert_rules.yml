groups:
  - name: cryptostream_pipeline_sla
    interval: 30s
    rules:

      # ── DATA FRESHNESS SLA ────────────────────────────────────────────────────
      # Banking: BOT regulations require real-time data to be no older than 5 minutes.
      # If Kafka consumer lag spikes, data in PostgreSQL becomes stale — triggering
      # this alert and escalating to the on-call data engineer.
      - alert: KafkaConsumerLagCritical
        expr: kafka_consumer_group_lag{group="flink_processor_v3"} > 10000
        for: 2m
        labels:
          severity: critical
          team: data-engineering
          compliance: bot-sla
        annotations:
          summary: "Kafka consumer lag is critically high"
          description: "Consumer group 'flink_processor_v3' lag is {{ $value }} messages. Real-time processing is falling behind. Potential SLA breach for AML monitoring."
          runbook: "Check Flink job health at http://flink-jobmanager:8081. Verify no task failures."

      - alert: KafkaConsumerLagWarning
        expr: kafka_consumer_group_lag{group="flink_processor_v3"} > 1000
        for: 5m
        labels:
          severity: warning
          team: data-engineering
        annotations:
          summary: "Kafka consumer lag is elevated"
          description: "Consumer group lag is {{ $value }} messages. Monitor for further increase."

      # ── DATA QUALITY FAILURE RATE ───────────────────────────────────────────
      # Banking: If more than 5% of trades fail DQ checks, it suggests upstream
      # data quality degradation. In a bank, this could mean feed connectivity issues
      # or schema changes in the source system.
      - alert: DataQualityFailureRateHigh
        expr: |
          rate(cryptostream_dq_failed_records_total[5m]) /
          (rate(cryptostream_dq_passed_records_total[5m]) + rate(cryptostream_dq_failed_records_total[5m])) > 0.05
        for: 5m
        labels:
          severity: warning
          team: data-engineering
          compliance: amlo-audit
        annotations:
          summary: "DQ failure rate exceeds 5%"
          description: "{{ $value | humanizePercentage }} of incoming trades are failing Data Quality checks. Review DLQ topic 'trade_stream_dlq' for error patterns."

      - alert: DataQualityFailureRateCritical
        expr: |
          rate(cryptostream_dq_failed_records_total[5m]) /
          (rate(cryptostream_dq_passed_records_total[5m]) + rate(cryptostream_dq_failed_records_total[5m])) > 0.20
        for: 2m
        labels:
          severity: critical
          team: data-engineering
          compliance: amlo-audit
        annotations:
          summary: "DQ failure rate exceeds 20% - CRITICAL"
          description: "{{ $value | humanizePercentage }} of trades are invalid. Possible upstream schema change or data source issue. Escalate immediately."

      # ── FLINK JOB HEALTH ────────────────────────────────────────────────────
      - alert: FlinkJobNotRunning
        expr: flink_jobmanager_numRunningJobs < 1
        for: 1m
        labels:
          severity: critical
          team: data-engineering
        annotations:
          summary: "No Flink jobs are running"
          description: "Stream processing has stopped. Whale detection and VWAP calculation are offline. AML monitoring may be impacted."

      - alert: FlinkCheckpointFailed
        expr: increase(flink_jobmanager_job_numberOfFailedCheckpoints[5m]) > 3
        for: 0m
        labels:
          severity: warning
          team: data-engineering
        annotations:
          summary: "Flink checkpoint failures detected"
          description: "{{ $value }} checkpoint failures in the last 5 minutes. Risk of data reprocessing on job restart."

      # ── AIRFLOW EOD REPORT SLA ───────────────────────────────────────────────
      # Banking: Failed EOD reports = regulatory non-compliance. Bot requires
      # daily_summary to be generated by 23:59 each business day.
      - alert: AirflowDagFailed
        expr: airflow_dag_run_duration_seconds{dag_id=~"daily_aggregation.*|dlq_processor.*", status="failed"} > 0
        for: 0m
        labels:
          severity: critical
          team: data-engineering
          compliance: bot-eod
        annotations:
          summary: "Critical Airflow DAG has failed"
          description: "DAG '{{ $labels.dag_id }}' has failed. Regulatory EOD report may be missing. Check Airflow UI immediately."

      # ── POSTGRESQL HEALTH ────────────────────────────────────────────────────
      - alert: PostgresDown
        expr: pg_up == 0
        for: 30s
        labels:
          severity: critical
          team: data-engineering
        annotations:
          summary: "PostgreSQL is down"
          description: "Hot storage is unavailable. Flink cannot write enriched trades or market metrics."

      - alert: PostgresConnectionsNearLimit
        expr: pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: warning
          team: data-engineering
        annotations:
          summary: "PostgreSQL connections near limit ({{ $value }}/100)"
          description: "Connection pool is nearly exhausted. New writes from Flink may fail."
