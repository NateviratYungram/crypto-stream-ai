---
# ============================================================================
# ZooKeeper Ensemble (3-node) for Kafka HA
# ============================================================================
# Banking Relevance: ZooKeeper provides leader election and distributed
# coordination for Kafka brokers. A 3-node ensemble tolerates 1 node failure
# while maintaining quorum — required for Virtual Bank HA compliance (BOT).
# In production, ZooKeeper nodes MUST be scheduled on separate physical nodes
# (enforced via podAntiAffinity) to survive hardware failures.
# ============================================================================
apiVersion: v1
kind: Service
metadata:
  name: zookeeper-headless
  namespace: cryptostream
  labels:
    app: zookeeper
spec:
  clusterIP: None  # Headless: each ZK Pod gets a stable DNS name (zookeeper-0.zookeeper-headless)
  selector:
    app: zookeeper
  ports:
  - name: client
    port: 2181
    targetPort: 2181
  - name: follower
    port: 2888
    targetPort: 2888
  - name: election
    port: 3888
    targetPort: 3888
---
apiVersion: v1
kind: Service
metadata:
  name: zookeeper
  namespace: cryptostream
  labels:
    app: zookeeper
spec:
  selector:
    app: zookeeper
  ports:
  - name: client
    port: 2181
    targetPort: 2181
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: zookeeper
  namespace: cryptostream
  labels:
    app: zookeeper
    component: coordination
spec:
  serviceName: zookeeper-headless
  replicas: 3
  podManagementPolicy: Parallel  # Start all ZK nodes simultaneously for faster bootstrap
  selector:
    matchLabels:
      app: zookeeper
  template:
    metadata:
      labels:
        app: zookeeper
    spec:
      # ── Anti-Affinity: Spread ZK pods across different nodes ──
      # Banking: Ensures a single node failure doesn't take down ZK quorum
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - zookeeper
            topologyKey: kubernetes.io/hostname
      containers:
      - name: zookeeper
        image: confluentinc/cp-zookeeper:7.5.0
        ports:
        - containerPort: 2181
          name: client
        - containerPort: 2888
          name: follower
        - containerPort: 3888
          name: election
        env:
        - name: ZOOKEEPER_CLIENT_PORT
          value: "2181"
        - name: ZOOKEEPER_TICK_TIME
          value: "2000"
        - name: ZOOKEEPER_INIT_LIMIT
          value: "10"
        - name: ZOOKEEPER_SYNC_LIMIT
          value: "5"
        # ZK_SERVERS: All 3 ZK nodes for ensemble membership
        - name: ZOOKEEPER_SERVERS
          value: "zookeeper-0.zookeeper-headless.cryptostream.svc.cluster.local:2888:3888;zookeeper-1.zookeeper-headless.cryptostream.svc.cluster.local:2888:3888;zookeeper-2.zookeeper-headless.cryptostream.svc.cluster.local:2888:3888"
        # Each ZK node needs a unique server ID (1, 2, 3)
        # This is derived from the Pod ordinal index via init container
        - name: ZOOKEEPER_SERVER_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        command:
        - bash
        - -c
        - |
          # Extract ordinal index from pod name (zookeeper-0 → 1, zookeeper-1 → 2, etc.)
          export ZOOKEEPER_SERVER_ID=$((${HOSTNAME##*-} + 1))
          echo "Starting ZooKeeper node with SERVER_ID=${ZOOKEEPER_SERVER_ID}"
          /etc/confluent/docker/run
        volumeMounts:
        - name: zk-data
          mountPath: /var/lib/zookeeper/data
        - name: zk-log
          mountPath: /var/lib/zookeeper/log
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          exec:
            command:
            - bash
            - -c
            - echo ruok | nc localhost 2181 | grep imok
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          exec:
            command:
            - bash
            - -c
            - echo ruok | nc localhost 2181 | grep imok
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 5
  volumeClaimTemplates:
  - metadata:
      name: zk-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 5Gi
  - metadata:
      name: zk-log
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 5Gi
