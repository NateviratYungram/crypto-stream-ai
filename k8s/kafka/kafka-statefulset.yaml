---
# ============================================================================
# Kafka HA Cluster — StatefulSet (3 Brokers)
# ============================================================================
# Banking Relevance: Multi-broker Kafka cluster ensures no single point of
# failure for event streaming. In Virtual Banks, Kafka handles critical
# transaction feeds (BAHTNET, PromptPay) where message loss is unacceptable.
#
# HA Configuration:
#   - 3 brokers with replication.factor=3
#   - min.insync.replicas=2 (tolerates 1 broker failure without data loss)
#   - StatefulSet for stable network identities and persistent storage
#   - Anti-affinity to spread brokers across physical nodes
# ============================================================================
apiVersion: v1
kind: Service
metadata:
  name: kafka-headless
  namespace: cryptostream
  labels:
    app: kafka
spec:
  clusterIP: None  # Headless: stable DNS for inter-broker communication
  selector:
    app: kafka
  ports:
  - name: internal
    port: 29092
    targetPort: 29092
  - name: external
    port: 9092
    targetPort: 9092
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: cryptostream
  labels:
    app: kafka
spec:
  selector:
    app: kafka
  ports:
  - name: internal
    port: 29092
    targetPort: 29092
  - name: external
    port: 9092
    targetPort: 9092
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: cryptostream
  labels:
    app: kafka
    component: message-broker
spec:
  serviceName: kafka-headless
  replicas: 3
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      # ── Anti-Affinity: Spread brokers across different nodes ──
      # Banking: Single node failure must NOT cause quorum loss
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - kafka
              topologyKey: kubernetes.io/hostname
      terminationGracePeriodSeconds: 120  # Allow in-flight messages to complete
      containers:
      - name: kafka
        image: confluentinc/cp-kafka:7.5.0
        ports:
        - containerPort: 9092
          name: external
        - containerPort: 29092
          name: internal
        command:
        - bash
        - -c
        - |
          # Derive BROKER_ID from StatefulSet ordinal (kafka-0 → 0, kafka-1 → 1, etc.)
          export KAFKA_BROKER_ID=${HOSTNAME##*-}
          # Each broker advertises its own stable DNS name
          export KAFKA_ADVERTISED_LISTENERS="PLAINTEXT://${HOSTNAME}.kafka-headless.cryptostream.svc.cluster.local:29092,PLAINTEXT_HOST://${HOSTNAME}.kafka-headless.cryptostream.svc.cluster.local:9092"
          echo "Starting Kafka broker ${KAFKA_BROKER_ID}"
          /etc/confluent/docker/run
        env:
        # ── ZooKeeper Connection (all 3 ZK nodes) ──
        - name: KAFKA_ZOOKEEPER_CONNECT
          value: "zookeeper-0.zookeeper-headless.cryptostream.svc.cluster.local:2181,zookeeper-1.zookeeper-headless.cryptostream.svc.cluster.local:2181,zookeeper-2.zookeeper-headless.cryptostream.svc.cluster.local:2181"
        - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
          value: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
        - name: KAFKA_INTER_BROKER_LISTENER_NAME
          value: "PLAINTEXT"
        # ── HA: Replication settings ──
        # Banking: These settings ensure no data loss even if 1 broker fails
        - name: KAFKA_DEFAULT_REPLICATION_FACTOR
          value: "3"
        - name: KAFKA_MIN_INSYNC_REPLICAS
          value: "2"
        - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
          value: "3"
        - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
          value: "3"
        - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
          value: "2"
        # ── Performance Tuning ──
        - name: KAFKA_NUM_PARTITIONS
          value: "6"
        - name: KAFKA_LOG_RETENTION_HOURS
          value: "168"       # 7 days retention
        - name: KAFKA_LOG_SEGMENT_BYTES
          value: "1073741824" # 1GB per segment
        - name: KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS
          value: "300000"     # Check every 5 min
        - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
          value: "3000"
        # ── Durability: Flush settings ──
        - name: KAFKA_LOG_FLUSH_INTERVAL_MESSAGES
          value: "10000"
        - name: KAFKA_LOG_FLUSH_INTERVAL_MS
          value: "1000"
        volumeMounts:
        - name: kafka-data
          mountPath: /var/lib/kafka/data
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "3Gi"
            cpu: "2000m"
        readinessProbe:
          tcpSocket:
            port: 9092
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          tcpSocket:
            port: 9092
          initialDelaySeconds: 60
          periodSeconds: 20
          timeoutSeconds: 5
  volumeClaimTemplates:
  - metadata:
      name: kafka-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 50Gi  # Production: Size based on retention period × throughput
