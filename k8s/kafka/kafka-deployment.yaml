---
# Kafka Deployment for CryptoStream AI
# Banking Relevance: Multi-broker Kafka cluster ensures no single point of failure.
# In real Virtual Banks, Kafka handles BAHTNET/PromptPay event streams where
# message loss is unacceptable. Replication factor=3 means 2 brokers can fail
# before data loss occurs.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: cryptostream
  labels:
    app: kafka
    component: message-broker
spec:
  replicas: 1  # Phase 7: Scale to 3 for HA cluster
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
      - name: kafka
        image: confluentinc/cp-kafka:7.5.0
        ports:
        - containerPort: 9092
          name: external
        - containerPort: 29092
          name: internal
        env:
        - name: KAFKA_BROKER_ID
          value: "1"
        - name: KAFKA_ZOOKEEPER_CONNECT
          value: "zookeeper:2181"
        - name: KAFKA_ADVERTISED_LISTENERS
          value: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092"
        - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
          value: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
        - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
          value: "1"  # Phase 7: Change to 3
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        readinessProbe:
          tcpSocket:
            port: 9092
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: cryptostream
spec:
  selector:
    app: kafka
  ports:
  - name: internal
    port: 29092
    targetPort: 29092
  - name: external
    port: 9092
    targetPort: 9092
